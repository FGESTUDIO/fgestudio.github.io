media:
  - name: portfolio_media
    label: 作品原图上传区
    input: works-2026
    output: /works-2026
    extensions: [png, jpg, jpeg, webp]
    rename: random

content:
  - name: portfolio_works
    label: FGESTUDIO 作品集
    type: file
    path: works-2026/works.json
    format: json
    fields:
      - name: works
        label: 作品
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title_cn} · {category}"
        fields:
          - name: id
            label: 作品 ID
            type: uuid
            required: true
            readonly: true
            options:
              editable: false
          - name: published
            label: 在作品集中显示
            type: boolean
            default: true
            description: 关闭后作品资料仍会保留，但客户看不到。
          - name: concept_project
            label: 概念作品
            type: boolean
            default: false
            description: 虚构品牌练习或概念案例请打开；客户页面会显示三语「概念作品」标签。
          - name: category
            label: 分类
            type: select
            required: true
            options:
              values:
                - name: social
                  label: 社交媒体视觉
                - name: poster
                  label: 海报设计
                - name: business-card
                  label: 名片设计
                - name: banner
                  label: 横幅设计

          - name: source_image
            label: 上传原图／替换图片
            type: image
            description: 上传后保存即可。系统会自动生成带 FGESTUDIO 水印的网页预览图，处理完成后这里会自动清空。水印不会自动遮住电话号码，请勿上传含第三方私人联络资料的图片。
            options:
              media: portfolio_media
              path: uploads
              extensions: [jpg, jpeg, png, webp]
              rename: random

          - name: image
            label: 当前水印预览图
            type: image
            readonly: true
            description: 客户作品集实际显示的安全预览图；由系统自动生成。
            options:
              media: portfolio_media

          - name: watermark_status
            label: 图片处理状态
            type: string
            readonly: true

          - name: title_cn
            label: 中文标题
            type: string
            required: true
          - name: industry_cn
            label: 中文行业
            type: string
            required: true
          - name: format_cn
            label: 中文设计形式
            type: string
            required: true
          - name: focus_cn
            label: 中文设计重点
            type: text
            required: true
          - name: alt_cn
            label: 中文图片说明
            type: string
            description: 供无障碍阅读使用；留空时会自动使用中文标题。

          - name: keep_manual_translations
            label: 保留手动翻译
            type: boolean
            default: false
            description: 通常保持关闭。若你手动修改了英文／马来文，并且以后改中文时也不想重新自动翻译，才打开此项。

          - name: translation_status
            label: 自动翻译状态
            type: string
            readonly: true

          - name: title_en
            label: 自动英文标题（可修改）
            type: string
          - name: industry_en
            label: 自动英文行业（可修改）
            type: string
          - name: format_en
            label: 自动英文设计形式（可修改）
            type: string
          - name: focus_en
            label: 自动英文设计重点（可修改）
            type: text
          - name: alt_en
            label: 自动英文图片说明（可修改）
            type: string

          - name: title_bm
            label: 自动马来文标题（可修改）
            type: string
          - name: industry_bm
            label: 自动马来文行业（可修改）
            type: string
          - name: format_bm
            label: 自动马来文设计形式（可修改）
            type: string
          - name: focus_bm
            label: 自动马来文设计重点（可修改）
            type: text
          - name: alt_bm
            label: 自动马来文图片说明（可修改）
            type: string

          - name: translation_source_hash
            label: 翻译版本
            type: string
            hidden: true

    actions:
      - name: process_portfolio
        label: 重新执行自动翻译和水印
        workflow: process-portfolio.yml
        ref: current
        confirm:
          title: 重新处理作品？
          message: 系统会检查尚未完成的中文翻译和图片水印，不会重复处理已完成的作品。
          button: 开始处理

settings:
  hide: true
  commit:
    identity: app
    templates:
      create: "portfolio: add {path}"
      update: "portfolio: update {path}"
      delete: "portfolio: remove {path}"
      rename: "portfolio: rename {oldPath} to {newPath}"
