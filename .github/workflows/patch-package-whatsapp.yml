name: Patch package WhatsApp message

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-package-whatsapp.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Simplify package enquiry message
        shell: python
        run: |
          from pathlib import Path
          import re

          script_path = Path("script.js")
          source = script_path.read_text(encoding="utf-8")

          replacement = '''function getPackageWhatsappMessage(link, lang) {
            const card = link.closest(".pricing-card");
            if (!card) return getPageText(lang, "whatsappMessage");

            const packageName = card.querySelector("h3")?.textContent.trim() || "";
            const messages = {
              cn: `你好，我想询问「${packageName}」。`,
              en: `Hi, I would like to ask about "${packageName}".`,
              bm: `Hai, saya ingin bertanya tentang "${packageName}".`,
            };

            return messages[lang] || messages.cn;
          }'''

          pattern = r'function getPackageWhatsappMessage\(link, lang\) \{.*?\n\}\n\nfunction applyTranslations'
          updated, count = re.subn(pattern, replacement + "\n\nfunction applyTranslations", source, count=1, flags=re.S)
          if count != 1:
            raise SystemExit("Unable to find the WhatsApp package message function")
          script_path.write_text(updated, encoding="utf-8")

          design_path = Path("design/index.html")
          design = design_path.read_text(encoding="utf-8")
          old = "script.js?v=20260711-package-enquiry"
          new = "script.js?v=20260711-package-name-only"
          if old not in design:
            raise SystemExit("Unable to find the design page script cache key")
          design_path.write_text(design.replace(old, new, 1), encoding="utf-8")

          workflow_path = Path(".github/workflows/patch-package-whatsapp.yml")
          workflow_path.unlink()

      - name: Commit website update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js design/index.html .github/workflows/patch-package-whatsapp.yml
          git commit -m "简化配套 WhatsApp 询问文案"
          git push
