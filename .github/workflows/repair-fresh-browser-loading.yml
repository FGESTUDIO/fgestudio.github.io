name: Repair fresh browser loading

on:
  push:
    paths:
      - "repair-fresh-browser-trigger.txt"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore original assets and write static SSM footers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          registration = "202603071810 (RA0133617-K)"
          pages = [
              Path("index.html"),
              Path("design/index.html"),
              Path("mcn/index.html"),
              Path("about/index.html"),
              Path("privacy-policy/index.html"),
              Path("terms-and-conditions/index.html"),
          ]

          # Restore the original complete CSS and JavaScript files.
          style_original = Path("style-original.css")
          if style_original.exists():
              Path("style.css").write_text(
                  style_original.read_text(encoding="utf-8"),
                  encoding="utf-8",
              )
              style_original.unlink()

          script_original = Path("script-original.js")
          if script_original.exists():
              Path("script.js").write_text(
                  script_original.read_text(encoding="utf-8"),
                  encoding="utf-8",
              )
              script_original.unlink()

          for page in pages:
              text = page.read_text(encoding="utf-8")

              # Add the registration number directly to the HTML footer.
              if registration not in text:
                  lines = text.splitlines()
                  rights_index = next(
                      (i for i, line in enumerate(lines)
                       if 'data-i18n="footer.rights"' in line),
                      None,
                  )
                  if rights_index is None:
                      raise RuntimeError(f"Copyright element not found in {page}")

                  line = lines[rights_index]
                  indent = line[: len(line) - len(line.lstrip())]

                  # Footer form 1: copyright <p> is entirely on one line.
                  if "<p " in line and "</p>" in line:
                      original_block = [line]
                      start = rights_index
                      end = rights_index
                  else:
                      # Footer form 2: copyright is a span nested inside a <p>.
                      start = rights_index
                      while start >= 0 and "<p" not in lines[start]:
                          start -= 1
                      end = rights_index
                      while end < len(lines) and "</p>" not in lines[end]:
                          end += 1
                      if start < 0 or end >= len(lines):
                          raise RuntimeError(f"Copyright paragraph not found in {page}")
                      original_block = lines[start:end + 1]
                      indent = lines[start][: len(lines[start]) - len(lines[start].lstrip())]

                  wrapped = [f'{indent}<div class="footer-legal">']
                  wrapped.extend(f"{indent}  {item.strip()}" for item in original_block)
                  wrapped.extend([
                      f'{indent}  <p class="footer-registration">',
                      f'{indent}    SSM Registration No.: {registration}',
                      f'{indent}  </p>',
                      f'{indent}</div>',
                  ])
                  lines[start:end + 1] = wrapped
                  text = "\n".join(lines) + "\n"

              # Force browsers and Cloudflare to request the repaired assets.
              text = re.sub(
                  r'(?:\.\./)*style\.css\?v=[^"\']+',
                  lambda m: m.group(0).split("?", 1)[0] + "?v=20260711-loading-repair",
                  text,
              )
              text = re.sub(
                  r'(?:\.\./)*script\.js\?v=[^"\']+',
                  lambda m: m.group(0).split("?", 1)[0] + "?v=20260711-loading-repair",
                  text,
              )
              page.write_text(text, encoding="utf-8")

          # Add stable footer styles to the real stylesheet.
          css = Path("style.css")
          css_text = css.read_text(encoding="utf-8")
          if "/* Static legal footer */" not in css_text:
              css_text += """

/* Static legal footer */
.footer-legal {
  display: grid;
  gap: 4px;
}

.footer-registration {
  margin: 0;
  color: rgba(224, 235, 255, 0.72);
  font-size: 0.86rem;
  font-weight: 400;
}
"""
              css.write_text(css_text, encoding="utf-8")
          PY

      - name: Commit repaired website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair website loading for fresh browsers"
          git push origin HEAD:main
