name: Add SSM registration number to footer

on:
  push:
    paths:
      - ".github/workflows/add-ssm-registration.yml"

permissions:
  contents: write

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add SSM registration number to every public page
        shell: python
        run: |
          from pathlib import Path

          pages = [
              Path("index.html"),
              Path("design/index.html"),
              Path("mcn/index.html"),
              Path("about/index.html"),
              Path("privacy-policy/index.html"),
              Path("terms-and-conditions/index.html"),
          ]
          registration = "202603071810 (RA0133617-K)"
          legal_line = (
              '        <p class="footer-registration">'
              f'SSM Registration No.: {registration}</p>'
          )

          for page in pages:
              text = page.read_text(encoding="utf-8")
              if registration in text:
                  continue

              marker = '        <p data-i18n="footer.rights">'
              marker_start = text.find(marker)
              if marker_start == -1:
                  raise RuntimeError(f"Footer rights marker not found in {page}")

              marker_end = text.find("</p>", marker_start)
              if marker_end == -1:
                  raise RuntimeError(f"Footer rights closing tag not found in {page}")
              marker_end += len("</p>")

              text = text[:marker_end] + "\n" + legal_line + text[marker_end:]
              page.write_text(text, encoding="utf-8")

      - name: Commit website update and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-ssm-registration.yml
          git add index.html design/index.html mcn/index.html about/index.html privacy-policy/index.html terms-and-conditions/index.html
          git commit -m "Add SSM registration number to website footer"
          git push
