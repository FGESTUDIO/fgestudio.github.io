name: Update YouTube channel statistics

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-youtube-stats.yml"
      - "scripts/update-youtube-stats.mjs"
      - "data/youtube-stats.json"
      - "mcn/index.html"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch current YouTube statistics
        run: |
          if [ -z "${YOUTUBE_API_KEY}" ]; then
            echo "YOUTUBE_API_KEY is not configured yet; skipping this scheduled update."
            exit 0
          fi
          node scripts/update-youtube-stats.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_HANDLE: "@yinsi_gaming"

      - name: Commit refreshed statistics when changed
        run: |
          if git diff --quiet -- data/youtube-stats.json; then
            echo "No channel statistic changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/youtube-stats.json
          git commit -m "Update YouTube channel statistics"
          git push
