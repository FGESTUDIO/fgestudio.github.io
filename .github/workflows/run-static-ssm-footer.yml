name: Run static SSM footer publication

on:
  push:
    paths:
      - ".github/workflows/run-static-ssm-footer.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update all public pages
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          pages = [
              Path("index.html"),
              Path("design/index.html"),
              Path("mcn/index.html"),
              Path("about/index.html"),
              Path("privacy-policy/index.html"),
              Path("terms-and-conditions/index.html"),
          ]
          registration = "202603071810 (RA0133617-K)"
          script_version = "20260711-static-ssm-footer"

          for page in pages:
              text = page.read_text(encoding="utf-8")
              lines = text.splitlines()

              if registration not in text:
                  for index, line in enumerate(lines):
                      if 'data-i18n="footer.rights"' not in line:
                          continue
                      indent = line[: len(line) - len(line.lstrip())]
                      lines[index:index + 1] = [
                          f'{indent}<div class="footer-legal">',
                          f'{indent}  {line.strip()}',
                          f'{indent}  <p class="footer-registration">SSM Registration No.: {registration}</p>',
                          f'{indent}</div>',
                      ]
                      break
                  else:
                      raise RuntimeError(f"Footer rights line not found in {page}")

              text = "\n".join(lines) + "\n"
              text = re.sub(
                  r"script\.js\?v=[^\"']+",
                  f"script.js?v={script_version}",
                  text,
              )
              page.write_text(text, encoding="utf-8")

          original = Path("script-original.js")
          if original.exists():
              Path("script.js").write_text(
                  original.read_text(encoding="utf-8"),
                  encoding="utf-8",
              )
              original.unlink()

          css = Path("style.css")
          css_text = css.read_text(encoding="utf-8")
          if ".footer-legal {" not in css_text:
              css_text += """

.footer-legal {
  display: grid;
  gap: 4px;
}

.footer-registration {
  margin: 0;
  color: rgba(224, 235, 255, 0.72);
  font-size: 0.86rem;
}
"""
              css.write_text(css_text, encoding="utf-8")
          PY

      - name: Commit and publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/run-static-ssm-footer.yml
          git rm -f .github/workflows/publish-static-ssm-footer.yml || true
          git add -A
          git commit -m "Publish SSM registration number in static footer"
          git push origin HEAD:main
